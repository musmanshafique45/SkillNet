<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Dashboard – SkillNest</title>
<link rel="stylesheet" href="../css/main.css"/>
<link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="dash-layout">
  <div id="sidebarContainer"></div>
  <main class="dash-main" id="dashMain">
    <div id="topbarContainer"></div>
    <div class="dash-content">

      <div class="dash-page-header">
        <div><h1 id="welcomeMsg">Platform Overview</h1><p>Monitor platform health, users, and revenue</p></div>
        <div style="display:flex;gap:12px">
          <button class="btn btn-outline" onclick="window.location.reload()">🔄 Refresh</button>
          <a href="settings.html" class="btn btn-primary">⚙️ Settings</a>
        </div>
      </div>

      <div class="dash-stats" id="statsRow"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px">
        <!-- RECENT USERS -->
        <div class="chart-container">
          <div class="chart-header">
            <h4>Recent Registrations</h4>
            <a href="users.html" class="btn btn-ghost btn-sm">View All</a>
          </div>
          <div class="table-wrapper" style="border:none">
            <table style="font-size:.85rem">
              <tbody id="recentUsers"></tbody>
            </table>
          </div>
        </div>

        <!-- RECENT COURSES -->
        <div class="chart-container">
          <div class="chart-header">
            <h4>Pending Courses (Moderation)</h4>
            <a href="courses.html" class="btn btn-ghost btn-sm">View All</a>
          </div>
          <div id="pendingCourses"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script>
  const session = Auth.requireAuth(['admin']);
  if (session) {
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('admin','dashboard');
    document.getElementById('topbarContainer').innerHTML = renderTopbar('Admin Dashboard');
    
    const users = DB.getAll('users');
    const courses = DB.getAll('courses');
    const enrollments = DB.getAll('enrollments');
    
    let totalRev = 0;
    courses.forEach(c => totalRev += (c.price * c.students));

    // STATS
    document.getElementById('statsRow').innerHTML = `
      <div class="dash-stat-card">
        <div class="dash-stat-icon icon-blue">👥</div>
        <div class="dash-stat-info">
          <div class="label">Total Users</div>
          <div class="value">${users.length}</div>
          <div class="change">Students & Teachers</div>
        </div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-icon icon-purple">📚</div>
        <div class="dash-stat-info">
          <div class="label">Total Courses</div>
          <div class="value">${courses.length}</div>
          <div class="change">${courses.filter(c=>c.status==='published').length} Published</div>
        </div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-icon icon-indigo">🎓</div>
        <div class="dash-stat-info">
          <div class="label">Enrollments</div>
          <div class="value">${enrollments.length}</div>
          <div class="change">Across all courses</div>
        </div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-icon icon-green">💰</div>
        <div class="dash-stat-info">
          <div class="label">Platform Revenue</div>
          <div class="value">$${totalRev.toLocaleString()}</div>
          <div class="change">Gross volume</div>
        </div>
      </div>`;

    // RECENT USERS
    const sortedUsers = [...users].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
    document.getElementById('recentUsers').innerHTML = sortedUsers.map(u => `
      <tr>
        <td style="padding:12px 0"><div style="display:flex;align-items:center;gap:10px"><div class="user-row-avatar">${avatarInitials(u.name)}</div><div><div style="font-weight:600;color:var(--text-primary)">${u.name}</div><div style="font-size:.75rem;color:var(--text-secondary)">${u.email}</div></div></div></td>
        <td style="padding:12px 0;text-align:right"><span class="badge badge-${u.role==='teacher'?'accent':'primary'}">${u.role}</span></td>
      </tr>`).join('');

    // PENDING COURSES
    const pending = courses.filter(c => c.status === 'pending');
    if (pending.length === 0) {
      document.getElementById('pendingCourses').innerHTML = '<div class="empty-state" style="padding:24px"><div class="empty-icon" style="font-size:2rem">✅</div><p>No courses waiting for approval.</p></div>';
    } else {
      document.getElementById('pendingCourses').innerHTML = pending.slice(0,4).map(c => {
        const teacher = DB.getById('users', c.teacher_id);
        return `
        <div style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:8px">
          <img src="${c.thumbnail}" style="width:60px;height:40px;border-radius:4px;object-fit:cover" onerror="this.style.background='var(--primary)'">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.title}</div>
            <div style="font-size:.75rem;color:var(--text-secondary)">By ${teacher?.name}</div>
          </div>
          <a href="courses.html" class="btn btn-ghost btn-sm">Review</a>
        </div>`;
      }).join('');
    }
  }
</script>
</body>
</html>
