<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quiz Builder – SkillNest</title>
<link rel="stylesheet" href="../css/main.css"/>
<link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="dash-layout">
  <div id="sidebarContainer"></div>
  <main class="dash-main" id="dashMain">
    <div id="topbarContainer"></div>
    <div class="dash-content">

      <div class="dash-page-header">
        <div>
          <button onclick="window.history.back()" class="btn btn-ghost btn-sm mb-4">← Back to Course</button>
          <h1>Quiz Builder</h1>
          <p id="cName" style="color:var(--primary);font-weight:600">Loading course...</p>
        </div>
      </div>

      <div class="card" style="max-width:800px;margin:0 auto;padding:32px">
        <div class="form-group">
          <label class="form-label">Quiz Title</label>
          <input type="text" id="qTitle" class="form-control" placeholder="e.g. React Fundamentals Check" required/>
        </div>
        <div class="grid-2" style="gap:16px;margin-bottom:32px">
          <div class="form-group mb-0">
            <label class="form-label">Time Limit (Minutes)</label>
            <input type="number" id="qTime" class="form-control" value="15" min="1"/>
          </div>
          <div class="form-group mb-0">
            <label class="form-label">Max Attempts</label>
            <input type="number" id="qAttempts" class="form-control" value="3" min="1"/>
          </div>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light);padding-bottom:12px;margin-bottom:20px">
          <h3>Questions</h3>
          <button class="btn btn-outline btn-sm" onclick="addQuestion()">➕ Add Question</button>
        </div>

        <div id="questionList"></div>
        <div id="emptyQ" class="empty-state" style="padding:32px"><div class="empty-icon" style="font-size:2rem">📝</div><p>No questions added yet. Click above to add one.</p></div>

        <div style="margin-top:32px;border-top:1px solid var(--border-light);padding-top:24px;display:flex;justify-content:flex-end">
          <button class="btn btn-accent btn-lg" onclick="saveQuiz()">💾 Save Full Quiz</button>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script>
  const session = Auth.requireAuth(['teacher']);
  document.getElementById('sidebarContainer').innerHTML = renderSidebar('teacher','quiz-builder');
  document.getElementById('topbarContainer').innerHTML = renderTopbar('Quiz Builder');

  const courseId = new URLSearchParams(window.location.search).get('course');
  const course = DB.getById('courses', courseId);
  
  if(!course || course.teacher_id !== session.userId) {
    alert('Select a valid course to build a quiz for.');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('cName').textContent = course.title;
  }

  let questions = [];

  function addQuestion() {
    const q = {
      id: generateId('qn'),
      tempId: Date.now(),
      type: 'mcq',
      text: '',
      options: ['','','',''],
      correct: 0
    };
    questions.push(q);
    renderQuestions();
  }

  function renderQuestions() {
    const list = document.getElementById('questionList');
    document.getElementById('emptyQ').style.display = questions.length ? 'none' : 'block';
    
    list.innerHTML = questions.map((q, idx) => `
      <div class="quiz-question-card" id="qCard_${q.tempId}">
        <div class="quiz-question-header" onclick="toggleQ(${q.tempId})">
          <div style="font-weight:600;display:flex;align-items:center;gap:10px">
            <span style="background:var(--primary);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem">${idx+1}</span>
            Question ${idx+1}
          </div>
          <div style="display:flex;gap:12px;align-items:center">
            <span style="font-size:.8rem;color:var(--text-secondary)">Multiple Choice</span>
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); removeQ(${q.tempId})" style="color:var(--danger)">🗑️</button>
          </div>
        </div>
        <div class="quiz-question-body" id="qBody_${q.tempId}">
          <div class="form-group">
            <label class="form-label">Question Text</label>
            <input type="text" class="form-control" value="${q.text}" onchange="updateQText(${q.tempId}, this.value)" placeholder="Enter your question here..."/>
          </div>
          <label class="form-label">Options & Correct Answer</label>
          <div class="form-hint" style="margin-bottom:12px">Select the radio button next to the correct answer.</div>
          ${q.options.map((opt, oIdx) => `
            <div class="answer-option ${q.correct===oIdx?'correct':''}">
              <input type="radio" name="correct_${q.tempId}" ${q.correct===oIdx?'checked':''} onchange="updateCorrect(${q.tempId}, ${oIdx})">
              <input type="text" class="form-control" style="background:transparent;border:none;padding:8px" value="${opt}" onchange="updateOpt(${q.tempId}, ${oIdx}, this.value)" placeholder="Option ${oIdx+1} text"/>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  window.toggleQ = (id) => {
    const el = document.getElementById(`qBody_${id}`);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }
  window.removeQ = (id) => { questions = questions.filter(q=>q.tempId!==id); renderQuestions(); }
  window.updateQText = (id, val) => { const q = questions.find(q=>q.tempId===id); if(q) q.text = val; }
  window.updateOpt = (id, oIdx, val) => { const q = questions.find(q=>q.tempId===id); if(q) q.options[oIdx] = val; }
  window.updateCorrect = (id, oIdx) => { const q = questions.find(q=>q.tempId===id); if(q) q.correct = oIdx; renderQuestions(); }

  function saveQuiz() {
    const title = document.getElementById('qTitle').value;
    const time = parseInt(document.getElementById('qTime').value) || 15;
    const att = parseInt(document.getElementById('qAttempts').value) || 3;

    if(!title) { showToast('Quiz title is required','error'); return; }
    if(questions.length===0) { showToast('Add at least one question','error'); return; }
    
    let valid = true;
    questions.forEach(q => {
      if(!q.text || q.options.some(o=>!o.trim())) valid = false;
    });
    if(!valid) { showToast('Please fill all question and option texts','error'); return; }

    const quizId = generateId('q');
    DB.insert('quizzes', { id: quizId, course_id: courseId, title: title, time_limit: time, max_attempts: att });
    
    questions.forEach(q => {
      DB.insert('questions', { id: q.id, quiz_id: quizId, type: q.type, question_text: q.text, options: q.options, correct_answer: q.correct });
    });

    showToast('Quiz created successfully!','success');
    setTimeout(() => window.location.href = `manage-course.html?id=${courseId}`, 1500);
  }
</script>
</body>
</html>
